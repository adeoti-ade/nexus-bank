spring.application.name=nexus-bank

# PostgreSQL Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/nexus_bank}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:secure_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Kafka Configuration
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.modulith.events.externalization.enabled=true

# JWT Configuration
app.jwt.secret=${JWT_SECRET:N3xu5B4nkS3cur1tyK3y2024Pr0duct10n!}
app.jwt.expiration-ms=86400000
app.jwt.issuer=nexus-bank

# Observability - OpenTelemetry
management.opentelemetry.tracing.export.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
management.otlp.metrics.export.url=${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:http://localhost:4318/v1/metrics}
management.tracing.sampling.probability=1.0
management.endpoints.web.exposure.include=health,info,metrics,prometheus

# Metrics
management.prometheus.metrics.export.enabled=true

# NIBSS
app.nibss.webhook-secret=${NIBSS_WEBHOOK_SECRET:nibss-webhook-secret-dev}
app.nibss.mock-mode=${NIBSS_MOCK_MODE:true}
app.nibss.base-url=${NIBSS_BASE_URL:http://localhost:8090}
spring.modulith.events.republication.enabled=true
spring.modulith.events.republication.interval=PT2M
