spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# JWT Configuration
app.jwt.secret=VGVzdFNlY3JldEtleUZvckp3dFRoYXRJc0xvbmdFbm91Z2hUb0JlVmFsaWQhIQ==
app.jwt.expiration-ms=86400000
app.jwt.issuer=nexus-bank-test
spring.kafka.bootstrap-servers=
spring.modulith.events.kafka.enabled=false

# Auth rate limiting — set very high in tests so tests are never throttled
app.auth.rate-limit.requests-per-minute=10000

# Transaction rate limiting — set very high so tests are never throttled
app.transaction.rate-limit.requests-per-minute=10000

# Transaction reconciliation — effectively disabled in tests (timeout far in the future, interval once per day)
app.transaction.processing-timeout-minutes=999
app.transaction.reconciliation.interval-ms=86400000

# NIBSS
app.nibss.webhook-secret=test-secret
app.nibss.mock-mode=true
app.nibss.base-url=https://test.com
