services:
  nexus-db:
    image: postgres:16-alpine
    container_name: nexus-db
    environment:
      POSTGRES_DB: nexus_bank
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexus_bank"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    # Port 8081 intentionally not mapped to host — access via docker exec or internal network only
    environment:
      KAFKA_CLUSTERS_0_NAME: nexus
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: nexus-kafka:9092
    networks:
      - backend

  nexus-kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: nexus-kafka
    # Port 9092 intentionally not mapped to host — broker is internal only
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@nexus-kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://nexus-kafka:9092

      # Required KRaft settings (VERY important)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      # Single node cluster id
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - backend

  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: jaeger
    ports:
      - "16686:16686" # UI
      - "4317:4317"  # OTLP gRPC
    networks:
      - backend

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - backend

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.97.0
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./docker/otel-collector/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4318:4318" # OTLP HTTP
    depends_on:
      - jaeger
      - prometheus
    networks:
      - backend

  grafana:
    image: grafana/grafana:10.4.1
    container_name: grafana
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "4040:4040"
    depends_on:
      - prometheus
      - jaeger
    networks:
      - backend

  mock-nibss:
    build: ./mock-nibss
    container_name: mock-nibss
    ports:
      - "8090:8090"
    environment:
      NIBSS_WEBHOOK_SECRET: ${NIBSS_WEBHOOK_SECRET}
      NEXUS_BANK_CALLBACK_URL: http://nexus-bank-app:8080/api/webhooks/nibss/transfer-out/callback
      CALLBACK_DELAY_SECONDS: 5
    networks:
      - backend

  nexus-bank-app:
    build: .
    container_name: nexus-bank-app
    ports:
      - "8082:8080"
      - "9091:9091"   # management/actuator port for health probes and monitoring
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://nexus-db:5432/nexus_bank
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}

      # Kafka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: nexus-kafka:9092
      SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL: PLAINTEXT
      SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET: earliest
      SPRING_KAFKA_PRODUCER_ACKS: all

      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
      OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: http://otel-collector:4318/v1/metrics

      # NIBSS
      NIBSS_WEBHOOK_SECRET: ${NIBSS_WEBHOOK_SECRET}
      NIBSS_MOCK_MODE: "false"
      NIBSS_BASE_URL: http://mock-nibss:8090

    depends_on:
      nexus-db:
        condition: service_healthy
      nexus-kafka:
        condition: service_healthy
      mock-nibss:
        condition: service_started
    networks:
      - backend

networks:
  backend:
    driver: bridge